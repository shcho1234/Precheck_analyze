 # ============================================================
# PreCheck 로그 분석 스케줄 정의 파일
# 파일명: PreCheck_AnalyzeLogs_Schedule.conf
# 위  치: ~/cfg/PreCheck_AnalyzeLogs_Schedule.conf
# 작성일: 2026-05-28
# 버  전: v1.0 (테스트용 샘플)
#
# [포맷]
#   서버 단위: [서버구분][분석주기기술]
#   파일 단위: [서버구분][대상파일명(절대경로)][분석주기기술]
#
# [분석주기기술 포맷]
#   배치: [배치|요일|시작시간]
#   주기: [주기|요일|시작시간|분석간격(분)|종료시간]
#
# [요일 표기]
#   0=일, 1=월, 2=화, 3=수, 4=목, 5=금, 6=토
#   범위: 1-5 (월~금), * (매일)
#
# [수집 → 분석 시간 간격 원칙]
#   분석 시작시간은 수집 시작시간보다 반드시 5분 이상 늦게 설정
#   수집이 완료된 후 분석이 실행되어야 최신 데이터 반영 가능
#   수집보다 먼저 분석이 실행되면 해당 주기 로그 누락 가능
#   (다음 주기에 자동 처리되나 실시간성 저하)
#
# [대상 서버]
#   1) dlprem01-테스트개발  (수집 파일: /home/dlprem01/log/monitoring.log)
#   2) pamoap01-자동주문    (수집 파일: /home/pamoap01/log/monitoring.log)
#
# [수집 스케줄 요약 - 분석 스케줄 설계 기준]
#   dlprem01  /home/dlprem01/log/monitoring.log  주기|1-5|000001|60|235959
#   dlprem01  /home/dlprem01/log/check.out       배치|1-5|120001
#   pamoap01  /home/pamoap01/log/monitoring.log  주기|1-5|080001|30|185959
#   pamoap01  /home/pamoap01/log/batch.log       배치|1-5|093001
#   pamoap01  /home/pamoap01/log/settle.log      주기|1-5|150001|10|160001
# ============================================================


