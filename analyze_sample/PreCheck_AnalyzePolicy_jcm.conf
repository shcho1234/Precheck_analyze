# ============================================================
# PreCheck 분석 정책 정의 파일
# 파일명: PreCheck_AnalyzePolicy.conf
# v2.0 - Dashboard 연동 LOG_ID 정책 추가
#
# [v2.0 변경사항]
#   - Dashboard 3번(정보성 중요 데이터)용 정보형 정책 신규 추가
#     MBSOSI_COUNT, MBFOSI_COUNT, MBCOSI_COUNT, MBJISU_COUNT
#     NXT_COUNT, OPT_MAX_COUNT
#     AUTO_ORDER_ACNT, CAP_REG_COUNT, CAP2_REG_COUNT, FREQ_CLUB_COUNT
#     MAX_CONN_PREV, HTS_MAX_CONN, MTS_MAX_CONN
#   - pamoap01-자동주문: DISK_USAGE → DISK_HOME 으로 LOG_ID 통일
#   - Dashboard 6번(리소스 도넛차트)용 DISK_HOME 정책 추가/변경
#
# ------------------------------------------------------------
# [파일 형식]
#   - 텍스트 파일, 한 줄에 하나의 정책을 정의 (개행문자 \n 으로 구분)
#   - '#' 으로 시작하는 줄은 주석(skip) 처리되어 무시됨
#   - 정의된 포맷을 따르지 않는 줄은 파싱 시 무시됨 (해당 줄만 스킵, 나머지는 정상 처리)
#
#   기본 형식: [서버구분][LOG_ID][입력타입][...타입별 필드...]
#     - 서버구분 : 수집 스케줄 정의서의 [서버구분]과 동일한 값 사용
#     - LOG_ID   : 수집 로그의 LOG_ID와 매칭되는 식별자
#     - 입력타입 : 아래 7종 중 하나 (문구/수치/날짜/존재/정보/비교/시간)
#
# ------------------------------------------------------------
# [입력타입별 포맷 및 의미]
#
#  1) 수치 (NumericPolicy)
#     [서버구분][LOG_ID][수치][연산자][임계치][경고비율(%)]
#     - 연산자   : >, >=, <, <=, = 중 하나
#     - 임계치   : 비교 기준값 (숫자)
#     - 경고비율 : 임계치 대비 경고(LEVEL_WARNING) 발생 비율(%)
#                  예) [수치][<][90][20] → logValue < 90 이면 정상,
#                      90 <= logValue 이면 에러
#                      logValue가 [90*(1-0.20)=72, 90) 구간이면 경고(임계치에 근접)
#                  예) [수치][>][10][20] → logValue > 10 이면 정상,
#                      logValue <= 10 이면 에러
#                      logValue가 (10, 10*(1+0.20)=12] 구간이면 경고
#                  - "=" 연산자는 정확히 일치해야 정상(그 외 에러), 경고 구간 없음
#                  - 경고비율을 0으로 두면 경고 구간 없이 정상/에러만 판정
#
#  2) 문구 (PhrasePolicy) - 에러 키워드 감시
#     [서버구분][LOG_ID][문구][키워드1,키워드2,...]
#     - 로그 내용에 키워드(쉼표로 구분, 여러 개 등록 가능) 중 하나라도
#       포함되면 에러로 판정
#
#  3) 날짜 (DatePolicy) - 영업일/날짜 확인
#     [서버구분][LOG_ID][날짜]
#     - 수집된 로그의 날짜값이 기준일(영업일 등)과 일치하는지 확인
#
#  4) 존재 (ExistencePolicy) - 파일/락/메모리 등 존재 여부 감시
#     [서버구분][LOG_ID][존재]
#     - 수집 로그(해당 LOG_ID)가 존재하면 정상, 존재하지 않으면 에러
#
#  5) 정보 (InfoPolicy) - 분석 없이 값 저장만 수행
#     [서버구분][LOG_ID][정보]
#     - 정상/에러 판정 없이 수집된 값을 그대로 저장
#     - Dashboard 등에서 최신값 조회용으로 사용 (정보성 데이터)
#
#  6) 비교 (ComparePolicy) - 전일/금일 등 값 비교
#     [서버구분][LOG_ID][비교]
#     - 별도 임계치 없이, 비교 대상 값 간의 차이 등을 분석 로직에서 판단
#
#  7) 시간 (TimePolicy) - 특정 작업의 완료 시각 점검
#     [서버구분][LOG_ID][시간][연산자][기준시각(HH:mm)]
#     - 연산자 : >, >=, <, <= 중 하나
#     - 기준시각(HH:mm) 대비 수집된 시각이 조건을 만족하는지 확인
#       예) [시간][<=][08:10] → 08:10 이전(이하)에 완료되어야 정상
#
# ------------------------------------------------------------
# [작성/운영 시 주의사항]
#   - 동일 [서버구분][LOG_ID] 조합을 중복 등록해도 모두 적재되어 분석에 사용될 수 있으므로,
#     동일 항목은 중복 등록하지 말고 하나만 유지할 것
#   - 줄 끝에 '#'으로 시작하는 설명 주석을 붙여도 파싱에는 영향 없음 (앞쪽 토큰만 인식)
#   - "⚠️" 표시된 서버 블록은 실제 수집 로그의 LOG_ID 확정 전 임시/예시 정책이므로,
#     운영 반영 전 반드시 실제 LOG_ID 및 임계치 값을 재검토할 것
# ============================================================

